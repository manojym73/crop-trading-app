<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Profile - Crop Trading</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark sticky-top navbar-glass">
    <div class="container">
      <a class="navbar-brand fw-bold" href="index.html">Crop Trading</a>
      <div id="nav-right"></div>
    </div>
  </nav>

  <main class="container py-4">
    <section class="profile-card">
      <div class="profile-top">
        <div class="avatar-wrap">
          <div class="avatar-box">
            <img id="profileAvatarImg" class="avatar-img d-none" alt="Profile image">
            <div id="avatarInitial" class="avatar-initial">F</div>
            <button type="button" class="avatar-edit-btn" onclick="openImagePicker()" aria-label="Upload image">
              <i class="bi bi-pencil-fill"></i>
            </button>
            <button type="button" id="removeImageBtn" class="avatar-remove-btn d-none" onclick="removeSelectedImage()" aria-label="Remove image">
              <i class="bi bi-x-lg"></i>
            </button>
          </div>
          <input type="file" id="profileImageInput" accept="image/png,image/jpeg,image/jpg,image/webp" hidden>
        </div>

        <div class="profile-meta">
          <h1 id="profileNameText">Farmer</h1>
          <p id="profileRoleText">Farmer</p>
        </div>
      </div>

      <div class="profile-info">
        <div class="info-row">
          <i class="bi bi-envelope"></i>
          <span id="profileEmailText">farmer@gmail.com</span>
        </div>
        <div class="info-row">
          <i class="bi bi-telephone"></i>
          <span id="profilePhoneText">8756784675</span>
        </div>
      </div>

      <div class="profile-tip">
        <i class="bi bi-shield-check me-2"></i>
        Keep your contact details updated so crop orders and communication stay smooth.
      </div>

      <div class="edit-form">
        <div class="row g-3">
          <div class="col-md-6">
            <label class="form-label fw-semibold">Full Name</label>
            <div class="input-modern">
              <i class="bi bi-person"></i>
              <input type="text" id="profileName" class="form-control border-0 bg-transparent" readonly>
            </div>
          </div>

          <div class="col-md-6">
            <label class="form-label fw-semibold">Phone Number</label>
            <div class="input-modern">
              <i class="bi bi-telephone"></i>
              <input type="text" id="profilePhone" class="form-control border-0 bg-transparent" readonly>
            </div>
          </div>

          <div class="col-12">
            <label class="form-label fw-semibold">Email Address</label>
            <div class="input-modern">
              <i class="bi bi-envelope"></i>
              <input type="email" id="profileEmail" class="form-control border-0 bg-transparent" readonly>
            </div>
          </div>

          <div class="col-md-6">
            <label class="form-label fw-semibold">Role</label>
            <div class="input-modern input-readonly">
              <i class="bi bi-person-badge"></i>
              <input type="text" id="profileRole" class="form-control border-0 bg-transparent" readonly>
            </div>
          </div>

          <div class="col-md-6">
            <label class="form-label fw-semibold">Account ID</label>
            <div class="input-modern input-readonly">
              <i class="bi bi-hash"></i>
              <input type="text" id="profileId" class="form-control border-0 bg-transparent" readonly>
            </div>
          </div>
        </div>

        <div class="d-flex justify-content-end gap-2 mt-4">
          <button type="button" class="btn btn-edit" id="editBtn" onclick="enableProfileEdit()">
            <i class="bi bi-pencil-square me-2"></i>Edit
          </button>
          <button type="button" class="btn btn-save" onclick="updateProfile()">
            <i class="bi bi-check2-circle me-2"></i>Save Changes
          </button>
        </div>
      </div>
    </section>
  </main>

  <div class="toast-container position-fixed top-0 end-0 p-3">
    <div id="liveToast" class="toast align-items-center text-white border-0 bg-profile" role="alert">
      <div class="d-flex">
        <div class="toast-body" id="toast-message">Done</div>
        <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/navbar.js"></script>
  <script src="js/notification.js"></script>
  <script src="js/profile.js"></script>
  <script>
    loadNavbar();
    loadProfileData();
  </script>
</body>
</html>
