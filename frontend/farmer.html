<!DOCTYPE html>
<html>

<head>

    <title>Farmer Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body onload="loadStats(); loadCropChart();">

    <nav class="navbar">
        <div id="notification-box" class="notification-box"></div>
        <h2>Farmer Dashboard</h2>
        <a href="index.html">Home</a>
        <a href="#" onclick="logout()">Logout</a>
        <!-- notification box -->

    </nav>

    <div class="container">

        <h2>Add Crop</h2>

        <input id="crop_name" placeholder="Crop Name">
        <input id="quantity" placeholder="Quantity">
        <input id="price" placeholder="Price">
        <input id="location" placeholder="Location">
        <input type="file" id="image">
        <button onclick="addCrop()">Add Crop</button>

    </div>

    <!-- Dashboard -->
    <h2>Dashboard</h2>

    <div class="stats">

        <div class="stat-card">
            <h3 id="totalCrops"></h3>
            <p>Total Crops</p>
        </div>

        <div class="stat-card">
            <h3 id="totalOrders"></h3>
            <p>Total Orders</p>
        </div>

        <div class="stat-card">
            <h3 id="totalFarmers"></h3>
            <p>Total Farmers</p>
        </div>

        <div class="stat-card">
            <h3 id="totalSalesmen"></h3>
            <p>Total Salesmen</p>
        </div>

    </div>

    <!-- Crop Statistics -->
    <h2>Crop Statistics</h2>

    <div class="card">
        <canvas id="cropChart" width="600" height="300"></canvas>
    </div>


    <!-- <script src="app.js"></script> -->
    <script src="js/config.js"></script>
    <div id="notification-box" class="notification-box"></div>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="js/crops.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/login.js"></script>
    <script src="js/dashboard.js"></script>


</body>

</html>
