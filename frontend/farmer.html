<!DOCTYPE html>
<html>

<head>
    <title>Farmer Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body onload="loadStats(); loadCropChart(); loadNavbar(); loadFarmerOrders();">
    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-success px-4">
        <a class="navbar-brand fw-bold">🌾 Crop Trading</a>

        <div class="ms-auto d-flex align-items-center gap-2" id="nav-right"></div>
    </nav>

    <div id="notification-box" class="notification-box"></div>

    <div class="content">

        <h1>Farmer Dashboard</h1>

        <h2>Received Orders</h2>

        <div id="farmer-orders"></div>
        
        <!-- ADD CROP -->
        <div class="card">
            <h3>Add Crop</h3>

            <input class="form-control" id="crop_name" placeholder="Crop Name">
            <input class="form-control" id="quantity" placeholder="Quantity (kg)">
            <input class="form-control" id="price" placeholder="Price per kg">
            <input class="form-control" id="location" placeholder="Location">
            <input class="form-control" type="file" id="image">

            <button class="btn btn-success mt-2" onclick="handleAddCrop()">Add Crop</button>
        </div>

        <!-- STATS -->
        <h2>Dashboard</h2>

        <div class="stats">
            <div class="card">
                <h3 id="totalCrops"></h3>
                <p>Total Crops</p>
            </div>

            <div class="card">
                <h3 id="totalOrders"></h3>
                <p>Total Orders</p>
            </div>

            <div class="card">
                <h3 id="totalFarmers"></h3>
                <p>Total Farmers</p>
            </div>

            <div class="card">
                <h3 id="totalSalesmen"></h3>
                <p>Total Salesmen</p>
            </div>
        </div>

        <!-- CHART -->
        <h2>Crop Statistics</h2>

        <div class="card">
            <canvas id="cropChart"></canvas>
        </div>

    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/config.js"></script>
    <script src="js/crops.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/orders.js"></script>

    <!-- ✅ ADD THIS -->
    <script src="js/farmerOrders.js"></script>

    <script src="js/notifications.js"></script>
    <script src="js/dashboard.js"></script>

</body>

</html>
