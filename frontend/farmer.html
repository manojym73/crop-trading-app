<!DOCTYPE html>
<html>

<head>
    <title>Farmer Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/farmer.css">
</head>

<body onload="initPage()">

    <!-- NAVBAR -->
    <nav class="navbar navbar-dark bg-success px-4 py-3 shadow-sm">
        <div class="container-fluid">

            <!-- Logo -->
            <a class="navbar-brand fw-bold fs-4" href="index.html">🌾 Crop Trading</a>

            <!-- Right Side -->
            <div class="ms-auto d-flex align-items-center gap-3">

                <!-- Home -->
                <a href="index.html" class="btn btn-outline-light btn-sm">
                    🏠 Home
                </a>

                <!-- ✅ ONLY BUTTON -->
                <button class="btn btn-outline-light btn-sm" onclick="openOrdersPage()">
                    📦 Received Orders
                </button>

                <!-- Profile -->
                <div id="nav-right"></div>

            </div>
        </div>
    </nav>

    <!-- MAIN -->
    <div class="container mt-4">

        <h2 class="fw-bold mb-4">👨‍🌾 Farmer Dashboard</h2>

        <!-- ADD CROP -->
        <div class="card p-4 shadow-sm mb-4">
            <h5 class="mb-3">➕ Add Crop</h5>

            <div class="row g-3">
                <div class="col-md-6">
                    <input class="form-control" id="crop_name" placeholder="Crop Name">
                </div>
                <div class="col-md-3">
                    <input class="form-control" id="quantity" placeholder="Quantity (kg)">
                </div>
                <div class="col-md-3">
                    <input class="form-control" id="price" placeholder="Price/kg">
                </div>
                <div class="col-md-6">
                    <input class="form-control" id="location" placeholder="Location">
                </div>
                <div class="col-md-6">
                    <input class="form-control" type="file" id="image">
                </div>
            </div>

            <button class="btn btn-success mt-3" onclick="handleAddCrop()">
                Add Crop
            </button>
        </div>

        <!-- MY CROPS -->
        <div class="card p-4 shadow-sm mb-4">

            <div class="d-flex justify-content-between">
                <h5>🌾 My Crops</h5>
                <button class="btn btn-outline-success btn-sm" onclick="loadMyCrops()">Refresh</button>
            </div>

            <div id="my-crops" class="row g-3 mt-2"></div>

        </div>

    </div>

    <!-- Scripts -->
    <script>
        let farmer = localStorage.getItem("farmer_id");

        if (!farmer) {
            alert("❌ Login as Farmer");
            window.location = "index.html";
        }

        function initPage() {
            loadNavbar();
            loadMyCrops();
            loadStats();
        }

        function openOrdersPage() {
            window.location = "farmer-orders.html";
        }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>

    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/crops.js"></script>
    <script src="js/dashboard.js"></script>

</body>

</html>
