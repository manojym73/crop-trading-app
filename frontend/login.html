<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Crop Trading</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>

<body>
  <div class="auth-wrap">
    <div class="auth-card glass-card fade-up">
      <div class="text-center mb-4">
        <h2 id="form-title" class="fw-bold">Welcome Back</h2>
        <p class="text-muted">Login or create your account to continue</p>
      </div>

      <div id="role-group" style="display:none;" class="mb-3">
        <label class="form-label">Role</label>
        <select id="role" class="form-select">
          <option value="">Select role</option>
          <option value="farmer">Farmer</option>
          <option value="salesman">Salesman</option>
        </select>
      </div>

      <div id="name-group" style="display:none;" class="mb-3">
        <label class="form-label">Name</label>
        <input type="text" id="name" class="form-control" placeholder="Enter name">
      </div>

      <div id="phone-group" style="display:none;" class="mb-3">
        <label class="form-label">Phone</label>
        <input type="text" id="phone" class="form-control" placeholder="Enter phone">
      </div>

      <div class="mb-3">
        <label class="form-label">Email</label>
        <input type="email" id="email" class="form-control" placeholder="Enter email">
      </div>

      <div class="mb-3">
        <label class="form-label">Password</label>
        <input type="password" id="password" class="form-control" placeholder="Enter password">
      </div>

      <button id="auth-submit" class="btn btn-success btn-glow w-100" onclick="submitForm()">Login</button>

      <p class="text-center mt-3 mb-0" id="toggle-text">
        Don't have an account? <a href="#" onclick="toggleForm(event)">Sign Up</a>
      </p>
    </div>
  </div>

  <div class="toast-container position-fixed top-0 end-0 p-3">
    <div id="liveToast" class="toast align-items-center text-white border-0 bg-success" role="alert">
      <div class="d-flex">
        <div class="toast-body" id="toast-message">Done</div>
        <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/notification.js"></script>
  <script src="js/login.js"></script>
</body>

</html>
