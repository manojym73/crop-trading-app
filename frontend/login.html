<!DOCTYPE html>
<html>

<head>
    <title>Login | Crop Trading</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- AOS -->
    <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/login.css">
</head>

<body>

    <!-- 🔥 NAVBAR -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-success px-5 py-3 shadow-sm">

        <div class="container-fluid">

            <!-- Logo -->
            <a class="navbar-brand fw-bold fs-4" href="index.html">
                🌾 Crop Trading
            </a>

            <!-- Right Side -->
            <div class="ms-auto">

                <a href="index.html" class="btn btn-light btn-sm fw-semibold px-3" onclick="goHomeSmart()">
                    🏠 Home
                </a>

            </div>

        </div>

    </nav>


    <!-- 🔥 LOGIN CARD -->
    <div class="container d-flex justify-content-center align-items-center vh-100">

        <div class="card auth-card shadow-lg p-4" data-aos="fade-up">

            <h3 id="form-title" class="text-center mb-3">Login</h3>

            <!-- ROLE -->
            <select id="role" class="form-select mb-3">
                <option value="farmer">Farmer</option>
                <option value="salesman">Salesman</option>
            </select>

            <!-- NAME -->
            <input type="text" id="name" class="form-control mb-3" placeholder="Name" style="display:none">

            <!-- PHONE -->
            <input type="text" id="phone" class="form-control mb-3" placeholder="Phone Number" style="display:none">

            <!-- EMAIL -->
            <input type="email" id="email" class="form-control mb-3" placeholder="Email">

            <!-- PASSWORD -->
            <input type="password" id="password" class="form-control mb-3" placeholder="Password">

            <!-- BUTTON -->
            <button class="btn btn-success w-100 mb-3" onclick="submitForm()">
                Submit
            </button>

            <!-- TOGGLE -->
            <p id="toggle-text" class="text-center">
                Don't have an account?
                <a href="#" onclick="toggleForm()">Sign Up</a>
            </p>

        </div>

    </div>


    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- AOS -->
    <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
    <script>
        AOS.init();
    </script>

    <script src="js/config.js"></script>
    <script src="js/login.js"></script>


</body>

</html>
