<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Orders</title>
  <!-- <link rel="icon" type="image/x-icon" href="favicon.ico"> -->
  <!-- or if using PNG -->
  <link rel="icon" type="image/png" href="images/logo.png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>

<body onload="checkSalesman()">
  <nav class="navbar navbar-expand-lg navbar-dark sticky-top navbar-glass shadow">
    <div class="container">
      <!-- <a class="navbar-brand fw-bold" href="index.html">🌾 Crop Trading</a> -->
      <a class="navbar-brand fw-bold" href="index.html">
        <img src="images/logo.png" alt="Crop Trading Logo" height="30">
        <span class="logo-text">
          <span class="logo-crop">Crop</span>
          <span class="logo-trading">Trading</span>
        </span>
      </a>
      <div id="nav-right"></div>
    </div>
  </nav>

  <header class="page-header">
    <div class="container">
      <div class="glass-card p-4" data-aos="fade-up">
        <span class="badge badge-soft-warning rounded-pill px-3 py-2">Order Tracking</span>
        <h1 class="page-title mt-3">My Orders</h1>
        <p class="page-subtitle mb-0">Track placed orders and view farmer contact details once an order is accepted.</p>
      </div>
    </div>
  </header>

  <section class="section-space pt-4">
    <div class="container">
      <div class="row g-4" id="orders-list"></div>
      <!-- <div class="modal fade" id="updateOrderModal" tabindex="-1" aria-hidden="true"> -->
      <div class="modal fade" id="updateOrderModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
          <div class="modal-content border-0 rounded-4 overflow-hidden shadow-lg">

            <div class="modal-header bg-success text-white border-0 px-4 py-3">
              <h3 class="modal-title fw-bold">Update Order</h3>
              <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body bg-white p-4">
              <input type="hidden" id="update-order-id">

              <div class="mb-4">
                <label class="form-label fw-semibold">Crop Name</label>
                <input type="text" id="update-crop-name" class="form-control form-control-lg rounded-3" readonly>
              </div>

              <div class="mb-4">
                <label class="form-label fw-semibold">Quantity</label>
                <input type="number" id="update-order-quantity" class="form-control form-control-lg rounded-3"
                  placeholder="Enter quantity">
              </div>

              <div class="d-flex justify-content-end gap-2 mt-4">
                <button type="button" class="btn btn-light border rounded-3 px-4" data-bs-dismiss="modal">
                  Cancel
                </button>
                <button type="button" class="btn btn-success rounded-3 px-4" onclick="saveUpdatedOrder()">
                  Save Changes
                </button>
              </div>
            </div>

          </div>
        </div>
      </div>
    </div>
  </section>

  <footer class="footer text-center">
    <div class="container">Salesman Orders • Crop Trading Platform</div>
  </footer>

  <div class="toast-container position-fixed top-0 end-0 p-3">
    <div id="liveToast" class="toast align-items-center text-white border-0 bg-success" role="alert">
      <div class="d-flex">
        <div class="toast-body" id="toast-message">Done</div>
        <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/navbar.js"></script>
  <script src="js/notification.js"></script>
  <script src="js/orders.js"></script>
  <script>
    AOS.init({ duration: 900, once: true });
    loadNavbar();
    loadSalesmanOrders();
  </script>
  <script>
    document.documentElement.setAttribute(
      "data-theme",
      localStorage.getItem("theme") || "light"
    );
  </script>
</body>

</html>
