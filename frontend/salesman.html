<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Salesman Marketplace</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>

<body onload="checkSalesman()">
  <nav class="navbar navbar-expand-lg navbar-dark sticky-top navbar-glass shadow">
    <div class="container">
      <a class="navbar-brand fw-bold" href="index.html">🌾 Crop Trading</a>
      <div id="nav-right"></div>
      <!-- <a href="profile.html" class="btn btn-outline-light btn-sm rounded-pill">Profile</a> -->
    </div>
  </nav>

  <header class="page-header">
    <div class="container">
      <div class="glass-card p-4 position-relative overflow-hidden" data-aos="fade-up">
        <div class="blur-orb orb-1"></div>
        <div class="blur-orb orb-2"></div>
        <span class="badge badge-soft-info rounded-pill px-3 py-2">Salesman Marketplace</span>
        <h1 class="page-title mt-3">Find fresh crops and place orders quickly</h1>
        <p class="page-subtitle mb-0">Browse crop listings, search by location, and manage your purchase workflow
          smoothly.</p>
      </div>
    </div>
  </header>

  <section class="section-space pt-4" id="market-section">
    <div class="container">
      <div class="card p-4 shadow-sm border-0">
        <div class="row g-3">
          <div class="col-md-3">
            <input type="text" id="searchCrop" class="form-control" placeholder="Search crop name">
          </div>

          <div class="col-md-3">
            <input type="text" id="searchLocation" class="form-control" placeholder="Location">
          </div>

          <div class="col-md-2">
            <input type="number" id="minPrice" class="form-control" placeholder="Min price">
          </div>

          <div class="col-md-2">
            <input type="number" id="maxPrice" class="form-control" placeholder="Max price">
          </div>

          <div class="col-md-2">
            <select id="sortPrice" class="form-select">
              <option value="">Sort</option>
              <option value="low">Price: Low to High</option>
              <option value="high">Price: High to Low</option>
            </select>
          </div>

          <div class="col-12 d-flex gap-2">
            <button class="btn btn-success" onclick="searchCrops()">Search</button>
            <button class="btn btn-outline-success" onclick="resetFilters()">Reset</button>
          </div>
        </div>
      </div>

      <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
        <div>
          <h2 class="section-title mb-0">Available Crops</h2>
          <p class="section-subtitle mb-0">Fresh marketplace listings from farmers</p>
        </div>
        <a href="orders.html" class="btn btn-outline-success btn-soft">
          <i class="bi bi-bag-check me-1"></i>My Orders
        </a>
      </div>

      <div class="row g-4" id="crop-list"></div>
      <div class="modal fade" id="updateOrderModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
          <div class="modal-content border-0 rounded-4 overflow-hidden shadow-lg">

            <div class="modal-header bg-success text-white border-0 px-4 py-3">
              <h3 class="modal-title fw-bold">Update Order</h3>
              <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body bg-white p-4">
              <input type="hidden" id="update-order-id">

              <div class="mb-4">
                <label class="form-label fw-semibold">Crop Name</label>
                <input type="text" id="update-crop-name" class="form-control form-control-lg rounded-3" readonly>
              </div>

              <div class="mb-4">
                <label class="form-label fw-semibold">Quantity</label>
                <input type="number" id="update-order-quantity" class="form-control form-control-lg rounded-3"
                  placeholder="Enter quantity">
              </div>

              <div class="d-flex justify-content-end gap-2 mt-4">
                <button type="button" class="btn btn-light border rounded-3 px-4" data-bs-dismiss="modal">
                  Cancel
                </button>
                <button type="button" class="btn btn-success rounded-3 px-4" onclick="saveUpdatedOrder()">
                  Save Changes
                </button>
              </div>
            </div>

          </div>
        </div>
      </div>
    </div>
  </section>

  <footer class="footer text-center">
    <div class="container">Salesman Marketplace • Crop Trading Platform</div>
  </footer>

  <div class="toast-container position-fixed top-0 end-0 p-3">
    <div id="liveToast" class="toast align-items-center text-white border-0 bg-success" role="alert">
      <div class="d-flex">
        <div class="toast-body" id="toast-message">Done</div>
        <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/navbar.js"></script>
  <script src="js/notification.js"></script>
  <script src="js/crops.js"></script>
  <script>
    AOS.init({ duration: 900, once: true });
    loadNavbar();
    loadCrops();
  </script>
</body>

</html>
