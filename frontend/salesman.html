<!DOCTYPE html>
<html>

<head>

    <title>Marketplace</title>
    <link rel="stylesheet" href="style.css">

</head>

<body onload="loadCrops()">

    <!-- Top Bar -->
    <div class="top-bar">

        <h2>Crop Marketplace</h2>

        <div class="top-actions">

            <button onclick="showOrders()">📦 My Orders</button>

            <button onclick="logout()">Logout</button>

        </div>

    </div>


    <!-- Search Section -->
    <div class="card">

        <input type="text" id="searchCrop" placeholder="Search crop name">

        <input type="text" id="searchLocation" placeholder="Location">

        <button onclick="searchCrops()">Search</button>

        <button onclick="loadCrops()">Reset</button>

    </div>


    <!-- Crop Marketplace -->
    <div id="crop-list"></div>


    <!-- Orders Section -->
    <div id="orders-section" style="display:none">

        <h2>My Orders</h2>

        <div id="orders-list"></div>

    </div>


    <script src="js/config.js"></script>
    <script src="js/crops.js"></script>
    <script src="js/orders.js"></script>
    <script src="js/notifications.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/login.js"></script>

</body>

</html>
