<!DOCTYPE html>
<html>

<head>
    <title>Marketplace</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body onload="loadCrops(); loadNavbar();">

    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-success px-4">
        <a class="navbar-brand fw-bold">🌾 Crop Trading</a>
        <div class="nav-left">
            <button onclick="showOrders()">📦 My Orders</button>
        </div>
        <div class="ms-auto d-flex align-items-center gap-2" id="nav-right"></div>
    </nav>


    <div id="notification-box" class="notification-box"></div>

    <!-- MAIN CONTENT -->
    <div class="content">

        <h1>Crop Marketplace</h1>

        <!-- SEARCH -->
        <div class="card search-box">
            <input type="text" id="searchCrop" placeholder="Search crop name">
            <input type="text" id="searchLocation" placeholder="Location">

            <button onclick="searchCrops()">Search</button>
            <button onclick="loadCrops()">Reset</button>
        </div>

        <!-- CROPS -->
        <div id="crop-list" class="row g-4"></div>

        <!-- ORDERS -->
        <div id="orders-section" style="display:none">
            <h2>My Orders</h2>
            <div id="orders-list"></div>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/config.js"></script>
    <script src="js/crops.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/orders.js"></script>
    <script src="js/notifications.js"></script>

</body>

</html>
