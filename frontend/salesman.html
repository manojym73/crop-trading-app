<!DOCTYPE html>
<html>

<head>
    <title>Crop Marketplace</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- AOS Animation -->
    <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="css/salesman.css">
</head>

<body onload="loadNavbar(); loadCrops();">

    <nav class="navbar navbar-expand-lg navbar-dark bg-success px-4 py-3 shadow-sm">
        <div class="container-fluid">

            <!-- Logo -->
            <a class="navbar-brand fw-bold fs-4" href="index.html">🌾 Crop Trading</a>

            <!-- Right Side -->
            <div class="ms-auto d-flex align-items-center gap-3">

                <!-- 🏠 Home Button -->
                <a href="index.html" class="btn btn-outline-light btn-sm">
                    🏠 Home
                </a>

                <!-- Other buttons (Orders etc.) -->
                <!-- Example -->
                <button class="btn btn-outline-light btn-sm" onclick="showOrders()">
                    📦 Orders
                </button>

                <!-- Profile -->
                <div id="nav-right"></div>

            </div>

        </div>
    </nav>

    <!-- 🔔 Notification -->
    <div id="notification-box" class="notification-box"></div>

    <!-- MAIN -->
    <div class="container mt-4">

        <h2 class="fw-bold mb-4 text-center" data-aos="fade-up">
            🛒 Crop Marketplace
        </h2>

        <!-- 🔍 SEARCH -->
        <div class="card p-4 shadow-sm mb-4" data-aos="fade-up">

            <div class="row g-3">
                <div class="col-md-5">
                    <input type="text" id="searchCrop" class="form-control" placeholder="Search crop name">
                </div>

                <div class="col-md-5">
                    <input type="text" id="searchLocation" class="form-control" placeholder="Location">
                </div>

                <div class="col-md-2 d-flex gap-2">
                    <button class="btn btn-success w-100" onclick="searchCrops()">Search</button>

                    <button class="btn btn-outline-success w-100" onclick="loadCrops()">Reset</button>
                </div>
            </div>

        </div>

        <!-- 🌾 CROPS -->
        <div id="crop-list" class="row g-4" data-aos="fade-up"></div>

        <!-- 📦 ORDERS -->
        <div id="orders-section" style="display:none">

            <div class="d-flex justify-content-between align-items-center mb-3">
                <h4>📦 My Orders</h4>

                <button class="btn btn-outline-dark" onclick="goBackToMarket()">
                    ← Back
                </button>

            </div>

            <div id="orders-list"></div>
        </div>

    </div>

    <script>
    let salesman = localStorage.getItem("salesman_id");

    if (!salesman) {
        alert("❌ Access denied! Login as Salesman.");
        window.location = "index.html";
    }
</script>
    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
    <script>AOS.init();</script>

    <script src="js/config.js"></script>
    <script src="js/crops.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/orders.js"></script>
    <script src="js/notifications.js"></script>

</body>

</html>
