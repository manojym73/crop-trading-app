<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Farmer Orders</title>
  <link rel="icon" type="image/png" href="images/logo.png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>

<body onload="checkFarmer()">
  <nav class="navbar navbar-expand-lg navbar-dark sticky-top navbar-glass shadow">
    <div class="container">
      <!-- <a class="navbar-brand fw-bold" href="index.html">🌾 Crop Trading</a> -->
      <a class="navbar-brand fw-bold" href="index.html">
        <img src="images/logo.png" alt="Crop Trading Logo" height="30">
        <span class="logo-text">
          <span class="logo-crop">Crop</span>
          <span class="logo-trading">Trading</span>
        </span>
      </a>
      <div id="nav-right"></div>
    </div>
  </nav>

  <header class="page-header">
    <div class="container">
      <div class="glass-card p-4" data-aos="fade-up">
        <span class="badge badge-soft-success rounded-pill px-3 py-2">Farmer Orders</span>
        <h1 class="page-title mt-3">Incoming Orders</h1>
        <p class="page-subtitle mb-0">Accept or reject incoming requests from salesmen and manage stock efficiently.</p>
      </div>
    </div>
  </header>

  <section class="section-space pt-4">
    <div class="container">
      <div class="row g-4" id="farmer-orders"></div>
    </div>
  </section>

  <footer class="footer text-center">
    <div class="container">Farmer Orders • Crop Trading Platform</div>
  </footer>

  <div class="toast-container position-fixed top-0 end-0 p-3">
    <div id="liveToast" class="toast align-items-center text-white border-0 bg-success" role="alert">
      <div class="d-flex">
        <div class="toast-body" id="toast-message">Done</div>
        <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/navbar.js"></script>
  <script src="js/notification.js"></script>
  <script src="js/crops.js"></script>
  <script src="js/farmerOrders.js"></script>
  <script>
    AOS.init({ duration: 900, once: true });
    loadNavbar();
    loadFarmerOrders();
    loadStats();
  </script>

  <!--    -->
  <script>
    document.documentElement.setAttribute(
      "data-theme",
      localStorage.getItem("theme") || "light"
    );
  </script>
</body>

</html>
