<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Crop Trading</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-success sticky-top shadow navbar-glass">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">🌾 Crop Trading</a>
            <div id="nav-right"></div>
        </div>
    </nav>

    <section class="hero-section">
        <div class="container">
            <div class="row align-items-center g-4">
                <div class="col-lg-6" data-aos="fade-right">
                    <span class="badge bg-success-subtle text-success floating-badge px-3 py-2 rounded-pill">Smart
                        Agriculture Marketplace</span>
                    <h1 class="hero-title mt-3">Buy and sell crops with a <span class="text-gradient">modern</span>
                        digital marketplace</h1>
                    <p class="hero-subtitle mt-3">Farmers can add crops and manage orders. Salesmen can browse listings,
                        place orders, and track status in one clean platform.</p>
                    <div class="d-flex gap-3 mt-4 flex-wrap">
                        <a href="login.html" class="btn btn-success btn-glow px-4 py-2">Get Started</a>
                        <button class="btn btn-outline-success rounded-pill px-4 py-2" onclick="goHomeSmart(event)">Open
                            Dashboard</button>
                    </div>
                </div>
                <div class="col-lg-6" data-aos="zoom-in">
                    <div class="glass-card p-4 rounded-4">
                        <div class="row g-3">
                            <div class="col-6">
                                <div class="stat-card glass-card text-center">
                                    <h2 id="totalCrops">0</h2>
                                    <p class="mb-0 text-muted">Total Crops</p>
                                </div>
                            </div>
                            <div class="col-6">
                                <div class="stat-card glass-card text-center">
                                    <h2 id="totalOrders">0</h2>
                                    <p class="mb-0 text-muted">Orders</p>
                                </div>
                            </div>
                            <div class="col-6">
                                <div class="stat-card glass-card text-center">
                                    <h2 id="totalFarmers">0</h2>
                                    <p class="mb-0 text-muted">Farmers</p>
                                </div>
                            </div>
                            <div class="col-6">
                                <div class="stat-card glass-card text-center">
                                    <h2 id="totalSalesmen">0</h2>
                                    <p class="mb-0 text-muted">Salesmen</p>
                                </div>
                            </div>
                        </div>
                        <div class="mt-4">
                            <canvas id="cropChart" height="140"></canvas>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <div class="toast-container position-fixed top-0 end-0 p-3">
        <div id="liveToast" class="toast align-items-center text-white border-0 bg-success" role="alert">
            <div class="d-flex">
                <div class="toast-body" id="toast-message">Done</div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/crops.js"></script>
    <script src="js/dashboard.js"></script>
    <script src="js/navbar.js"></script>
    <script src="js/notification.js"></script>
    <script>
        AOS.init({ duration: 900, once: true });
        loadNavbar();
        loadStats();
        loadCropChart();
    </script>
</body>

</html>
